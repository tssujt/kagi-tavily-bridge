name: Test & Lint

on:
  push:
  pull_request:

jobs:
  test-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Lint
        uses: j178/prek-action@v2

      - name: Test
        run: cargo test --locked
